<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<title>{{title}}</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Roboto", sans-serif;
    padding: 24px;
    margin: 0;
    color: #1a1a1a;
    line-height: 1.45;
    font-size: 14px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 6px;
    border-bottom: 2px solid #2e5266;
    padding-bottom: 6px;
  }
  .meta {
    font-size: 12px;
    color: #666;
    margin-bottom: 20px;
  }
  #content { margin-top: 8px; }
  .photo-block {
    margin: 14px 0;
    page-break-inside: avoid;
  }
  .photo-block img {
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    display: block;
  }
  .photo-block p {
    margin: 6px 0 0;
    font-size: 13px;
    color: #333;
    font-style: italic;
  }
  .text-block {
    margin: 12px 0;
    white-space: pre-wrap;
  }
  .text-block p {
    margin: 0;
  }
</style>
</head>
<body>
<h1>{{title}}</h1>
<div class="meta">Helyszíni szemle jegyzőkönyve</div>
<div id="content"></div>
</body>
</html>
