name: Android

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  test-build-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install PDF golden tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils imagemagick

      - name: Build debug APK
        run: ./build-pk.sh debug

      - name: Run unit and Robolectric tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Verify Compose screenshot goldens
        run: ./gradlew :app:verifyRoborazziDebug

      - name: Verify PDF goldens
        run: ./scripts/verify-pdf-goldens.sh

      - name: Run lint
        run: ./gradlew :app:lintDebug

  instrumented-pdf:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented PDF export smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=hu.gc.jegyzokonyv.domain.usecase.ExportPdfUseCaseInstrumentedTest
